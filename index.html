<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --base:      #FFFFFF;
      --ink:       #16141A;
      --primary:   #6B5B95;   /* muted violet */
      --secondary: #4E4270;   /* deeper plum */
      --secondary-light: #C9BEDD; /* pale lavender for text on dark bg */
      --accent:    #E4DEF0;   /* lavender mist */
      --muted:     #6B6672;
      --card:      #FFFFFF;
      --border:    #E3DDEE;
    }
    html, body {
      height: 100%;
      background: var(--base);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      overflow: hidden;
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      overflow-y: auto;
      opacity: 1;
      transform: translateX(0);
      transition: opacity 0.35s ease, transform 0.35s ease;
      will-change: opacity, transform;
    }
    .screen.hidden {
      opacity: 0; pointer-events: none; transform: translateX(28px);
    }

    /* ── COVER ── */
    #cover { align-items: stretch; }
    .cover-hero {
      width: 100%;
      height: 52vw;
      max-height: 280px;
      object-fit: cover;
      display: block;
      flex-shrink: 0;
    }
    .cover-body {
      flex: 1; padding: 32px 24px 40px;
      display: flex; flex-direction: column; align-items: flex-start;
    }
    .eyebrow {
      font-size: 10px; font-weight: 500; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--primary); margin-bottom: 10px;
    }
    .cover-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 9vw, 46px); font-weight: 700; line-height: 1.08;
      margin-bottom: 12px;
    }
    .cover-sub {
      font-size: 14px; line-height: 1.65; color: var(--muted);
      max-width: 310px; margin-bottom: 32px;
    }
    .cover-meta {
      display: flex; gap: 20px; margin-bottom: 32px;
    }
    .cover-meta-item {
      display: flex; flex-direction: column; gap: 3px;
    }
    .cover-meta-item .val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 700; color: var(--ink);
    }
    .cover-meta-item .lbl {
      font-size: 10px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
    }
    .btn-primary {
      align-self: stretch;
      background: var(--ink); color: var(--base);
      border: none; border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 17px 40px;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .btn-primary:active { background: var(--secondary); transform: scale(0.98); }

    /* ── QUESTION ── */
    #question { align-items: stretch; }
    .q-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px 10px;
      flex-shrink: 0;
    }
    .q-progress-track {
      flex: 1; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .q-progress-fill {
      height: 100%; background: var(--primary); border-radius: 99px;
      transition: width 0.45s cubic-bezier(.4,0,.2,1);
    }
    .q-step-label {
      font-size: 11px; font-weight: 500; color: var(--muted);
      white-space: nowrap; letter-spacing: 0.04em;
    }
    .q-image {
      width: 100%; height: 44vw; max-height: 220px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--secondary-light) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 62px; flex-shrink: 0; overflow: hidden;
    }
    .q-image img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .q-body { flex: 1; padding: 22px 20px 108px; }
    .q-counter {
      font-size: 10px; font-weight: 500; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--primary); margin-bottom: 6px;
    }
    .q-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(20px, 5.5vw, 28px); font-weight: 600; line-height: 1.22;
      margin-bottom: 22px;
    }
    .options-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .option-btn {
      background: var(--card);
      border: 1.5px solid var(--border); border-radius: 6px;
      padding: 14px 12px; text-align: left; cursor: pointer;
      transition: border-color 0.18s, background 0.18s, transform 0.12s;
      display: flex; flex-direction: column; gap: 5px;
    }
    .option-btn:active { transform: scale(0.97); }
    .opt-label {
      font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
    }
    .opt-text {
      font-size: 13px; line-height: 1.4; color: var(--ink);
    }
    .option-btn.selected {
      border-color: var(--primary); background: var(--accent);
    }
    .option-btn.selected .opt-label { color: var(--primary); }
    .q-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--base); border-top: 1px solid var(--border);
      padding: 12px 16px 16px; display: flex; gap: 10px;
      z-index: 10;
    }
    .btn-ghost {
      flex: 1; background: transparent;
      border: 1.5px solid var(--ink); border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 14px; cursor: pointer; color: var(--ink);
    }
    .btn-ghost:active { background: var(--border); }
    .btn-next {
      flex: 2.5; background: var(--ink); color: var(--base);
      border: none; border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 14px; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-next:disabled { opacity: 0.32; cursor: default; }

    /* ── RESULT ── */
    #result { align-items: stretch; }
    .result-header {
      background: var(--ink); color: var(--base);
      padding: 44px 24px 32px; text-align: center; flex-shrink: 0;
    }
    .result-header .eyebrow { color: var(--secondary-light); margin-bottom: 10px; }
    .result-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(26px, 7.5vw, 40px); font-weight: 700; line-height: 1.1;
      margin-bottom: 8px;
    }
    .result-header p { font-size: 13px; color: var(--secondary-light); line-height: 1.6; }
    .result-count-bar {
      background: var(--secondary); color: var(--secondary-light);
      padding: 10px 24px; text-align: center;
      font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .products-list {
      flex: 1; padding: 20px; display: flex; flex-direction: column;
      gap: 14px; padding-bottom: 36px;
    }
    .product-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; display: flex; align-items: center;
      gap: 16px; padding: 16px;
      opacity: 0; animation: slideUp 0.4s ease forwards;
    }
    @keyframes slideUp {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .product-img {
      width: 80px; height: 80px; min-width: 80px;
      border-radius: 6px; overflow: hidden;
      background: linear-gradient(135deg, var(--accent) 0%, var(--secondary-light) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px;
    }
    .product-img img {
      width: 100%; height: 100%;
      object-fit: contain;
      background: #f5f5f5;
      display: block;
    }
    .product-info { flex: 1; min-width: 0; }
    .product-tag {
      font-size: 10px; font-weight: 500; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--secondary); margin-bottom: 4px;
    }
    .product-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px; font-weight: 600; line-height: 1.2;
      margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .btn-buy {
      display: inline-block;
      background: var(--primary); color: #fff;
      border: none; border-radius: 2px; text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 9px 16px; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-buy:active { background: var(--secondary); }
    .retake-wrap { padding: 0 20px 48px; display: flex; flex-direction: column; gap: 10px; }
    .btn-send {
      width: 100%; background: var(--primary); color: #fff;
      border: none; border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 16px; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-send:active { background: var(--secondary); }
    .btn-retake {
      width: 100%; background: transparent;
      border: 1.5px solid var(--ink); border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 16px; cursor: pointer; color: var(--ink);
    }
  </style>
</head>

══════════════════════════════════════ -->

  <div class="retake-wrap">

    <button class="btn-retake" onclick="retakeQuiz()">再一次</button>
  </div>
</div>

      { text: "深度保濕、有彈性", product: ["P07","P14"] },

    ]
  },
  {

    title: "你對洗髮產品的配方有什麼偏好？",
    options: [
      { text: "低刺激、無矽/無鹽配方", product: null },
      { text: "含修護成分（蛋白、油脂等）", product: null },
      { text: "控油淨化配方（如深層清潔、去角質）", product: null },
      { text: "重視香氛與使用感（偏好高級香調）", product: "P19" },
    ]
  },
  {
    emoji: "🚿",
    title: "希望頭皮水的主要功效？",
    options: [
      { text: "強效淨化、去除多餘油脂",   product: ["P20","P21"] },
      { text: "即時舒緩、降低敏感與紅腫", product: ["P20","P21"] },

];

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let currentQ = 0;
let answers  = new Array(QUESTIONS.length).fill(null);

// ── helpers ──────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  document.getElementById(id).scrollTop = 0;
}

function getRecommended() {
  const seen = new Set();
  const list = [];
  QUESTIONS.forEach((q, qi) => {
    if (answers[qi] !== null) {
      const products = q.options[answers[qi]].product;
      const pids = Array.isArray(products) ? products : [products];
      pids.forEach(pid => {
        if (pid && !seen.has(pid)) { seen.add(pid); list.push(pid); }
      });
    }
  });
  return list;
}

// ── COVER ────────────────────────────────────────────────────
function startQuiz() {
  currentQ = 0;
  answers.fill(null);
  renderQuestion();
  show('question');
}

// ── QUESTION ─────────────────────────────────────────────────
function renderQuestion() {
  const q     = QUESTIONS[currentQ];
  const total = QUESTIONS.length;
  const pct   = (currentQ / total) * 100;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('qStepLabel').textContent   = `${currentQ + 1} / ${total}`;

  const qImageEl = document.getElementById('qImage');
  if (q.image) {
    qImageEl.innerHTML = `<img src="${q.image}" alt="" />`;
  } else {
    qImageEl.innerHTML = '';
    qImageEl.textContent = q.emoji;
  }

  document.getElementById('qCounter').textContent = `第 ${currentQ + 1} 題，共 ${total} 題`;
  document.getElementById('qTitle').textContent   = q.title;

  const grid   = document.getElementById('optionsGrid');
  const labels = ['A', 'B', 'C', 'D'];
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[currentQ] === i ? ' selected' : '');
    btn.innerHTML = `<span class="opt-label">${labels[i]}</span><span class="opt-text">${opt.text}</span>`;
    btn.onclick = () => selectOption(i);
    grid.appendChild(btn);
  });

  const isFirst = currentQ === 0;
  const isLast  = currentQ === total - 1;
  document.getElementById('btnPrev').style.display = isFirst ? 'none' : 'block';
  const btnNext = document.getElementById('btnNext');
  btnNext.disabled    = answers[currentQ] === null;
  btnNext.textContent = isLast ? '查看結果 →' : '繼續 →';
}

function selectOption(i) {
  answers[currentQ] = i;
  document.querySelectorAll('.option-btn').forEach((b, idx) =>
    b.classList.toggle('selected', idx === i)
  );
  document.getElementById('btnNext').disabled = false;
}

function nextQuestion() {
  if (answers[currentQ] === null) return;
  if (currentQ < QUESTIONS.length - 1) { currentQ++; renderQuestion(); }
  else showResult();
}

function prevQuestion() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
  else show('cover');
}

// ── RESULT (in-app, NO price shown) ────────────────────────────
function showResult() {
  const recommended = getRecommended();

  document.getElementById('resultCountBar').textContent =
    `${recommended.length} 款符合您髮質的產品`;

  const list = document.getElementById('productsList');
  list.innerHTML = '';
  recommended.forEach((pid, idx) => {
    const p    = PRODUCTS[pid];
    const card = document.createElement('div');
    card.className = 'product-card';
    card.style.animationDelay = (idx * 0.08 + 0.04) + 's';
    card.innerHTML = renderProductCard(p);
    list.appendChild(card);
  });

  show('result');
}

function renderProductCard(p) {
  const imgHTML = p.image
    ? `<div class="product-img"><img src="${p.image}" alt="${p.name}" /></div>`
    : `<div class="product-img">${p.emoji || ''}</div>`;
  return `
    ${imgHTML}
    <div class="product-info">
      <div class="product-name">${p.name}</div>
      <a class="btn-buy" href="${p.storeUrl}" target="_blank">立即購買</a>
    </div>`;
}

function retakeQuiz() {
  answers.fill(null);
  currentQ = 0;
  renderQuestion();
  show('question');
}

// ── FLEX MESSAGE → LINE CHAT (price shown here only) ───────────
function buildFlexBubble(p) {
  return {
    type: "bubble",
    size: "kilo",
    body: {
      type: "box",
      layout: "vertical",
      paddingAll: "0px",
      backgroundColor: "#FAFBF9",
      contents: [
        {
          type: "box",
          layout: "vertical",
          paddingAll: "0px",
          contents: [
            {
              type: "image",
              url: p.image || "https://via.placeholder.com/300",
              size: "full",
              aspectRatio: "1:1",
              aspectMode: "cover"
            },
            {
              type: "box",
              layout: "vertical",
              contents: [],
              position: "absolute",
              background: {
                type: "linearGradient",
                angle: "0deg",
                startColor: "#16141Acc",
                endColor: "#16141A00"
              },
              width: "100%",
              height: "50%",
              offsetBottom: "0px",
              offsetStart: "0px"
            },
            {
              type: "box",
              layout: "vertical",
              position: "absolute",
              offsetBottom: "0px",
              offsetStart: "0px",
              offsetEnd: "0px",
              paddingAll: "12px",
              contents: [
                {
                  type: "text",
                  text: p.name,
                  color: "#FAFBF9",
                  size: "sm",
                  weight: "bold",
                  wrap: true
                },
                {
                  type: "text",
                  text: p.price,
                  color: "#e2bea3",
                  size: "sm",
                  weight: "bold"
                }
              ]
            }
          ]
        },
        {
          type: "box",
          layout: "vertical",
          backgroundColor: "#FFFFFF",
          paddingAll: "12px",
          contents: [
            {
              type: "button",
              action: {
                type: "uri",
                label: "立即購買",
                uri: p.storeUrl
              },
              style: "primary",
              color: "#e2bea3",
              height: "sm"
            }
          ]
        }
      ]
    }
  };
}

function buildIntroBubble() {
  return {
    type: "bubble",
    size: "kilo",
    body: {
      type: "box",
      layout: "vertical",
      paddingAll: "0px",
      backgroundColor: "#FAFBF9",
      contents: [
        {
          type: "image",
          url: "https://raw.githubusercontent.com/sh-arch2260/product-catalog/master/esuchen/result-card.png",
          size: "full",
          aspectRatio: "1:1",
          aspectMode: "cover"
        },
        {
          type: "box",
          layout: "horizontal",
          backgroundColor: "#FFFFFF",
          paddingAll: "12px",
          contents: [
            {
              type: "text",
              text: "您的專屬髮品推薦",
              color: "#7e5f49",
              size: "sm",
              weight: "bold",
              gravity: "center",
              flex: 1
            },
            {
              type: "text",
              text: "→",
              color: "#7e5f49",
              size: "md",
              weight: "bold",
              align: "end",
              gravity: "center"
            }
          ]
        }
      ]
    }
  };
}

async function sendToChat() {
  const recommended = getRecommended();

  if (recommended.length === 0) {
    alert("沒有符合的產品推薦！");
    return;
  }

  const bubbles = [buildIntroBubble(), ...recommended.map(pid => buildFlexBubble(PRODUCTS[pid]))];

  try {
    await liff.sendMessages([
      {
        type: "flex",
        altText: "您的專屬髮品推薦 🌿",
        contents: {
          type: "carousel",
          contents: bubbles
        }
      }
    ]);
    alert("已傳送到聊天室！");
  } catch (e) {
    console.error(e);
    alert("傳送失敗，請確認是否在 LINE 中開啟。");
  }
}
